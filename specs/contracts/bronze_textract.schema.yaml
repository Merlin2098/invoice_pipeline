title: bronze_textract_record
type: object
additionalProperties: false
required:
  - run_id
  - document_id
  - source_s3_key
  - source_file_name
  - textract_response
  - extraction_engine
  - extraction_timestamp
  - status
properties:
  run_id:
    type: string
  document_id:
    type: string
  source_s3_key:
    type: string
  source_file_name:
    type: string
  textract_job_id:
    type:
      - string
      - "null"
  textract_response_s3_key:
    type:
      - string
      - "null"
  textract_response:
    type: object
  extraction_engine:
    type: string
    enum:
      - textract_analyze_expense
      - local_tesseract_baseline
  extraction_timestamp:
    type: string
    format: date-time
  status:
    type: string
    enum:
      - success
      - failed
  error_message:
    type:
      - string
      - "null"

