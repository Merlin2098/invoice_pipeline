repos:
  - repo: local
    hooks:
      - id: ai-refresh-light
        name: AI refresh (light)
        entry: python scripts/ai_refresh.py --light
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-format
        name: ruff format
        entry: ./.venv/Scripts/python.exe -m ruff format ai src tests scripts
        language: system
        pass_filenames: false
      - id: ruff-lint
        name: ruff lint
        entry: ./.venv/Scripts/python.exe -m ruff check ai src tests scripts
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: ./.venv/Scripts/python.exe -m pytest
        language: system
        pass_filenames: false
        stages: [manual]
      - id: sync-requirements
        name: Sync virtual environment dependencies
        entry: ./.venv/Scripts/python.exe scripts/sync_requirements.py
        language: system
        files: ^requirements\.txt$
        pass_filenames: false
