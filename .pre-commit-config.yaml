repos:
  - repo: local
    hooks:
      - id: ai-refresh
        name: AI refresh
        entry: python scripts/hooks/ai_refresh.py
        language: python
        additional_dependencies:
          - pyyaml
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-lint
        name: ruff lint
        entry: python scripts/quality/run_ruff_check.py
        language: python
        additional_dependencies:
          - ruff
        pass_filenames: false
        stages: [manual]
      - id: sync-dependencies
        name: Sync virtual environment dependencies
        entry: python scripts/hooks/sync_dependencies.py
        language: system
        args: [--manager, uv]
        files: ^(requirements(?:\.[A-Za-z0-9_-]+)?\.txt|pyproject\.toml|uv\.lock|\.template-profile)$
        pass_filenames: false
